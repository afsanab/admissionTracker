name: Deploy Backend (Azure App Service)

# Deploys caretrack-backend to Azure App Service.
#
# SETUP (one-time, done by you in GitHub + Azure):
#   1. In the Azure portal: App Service -> Deployment Center, or download the
#      publish profile (App Service -> "Get publish profile").
#   2. In GitHub: repo Settings -> Secrets and variables -> Actions, add:
#        - secret  AZURE_WEBAPP_PUBLISH_PROFILE  = contents of the publish profile XML
#        - variable AZURE_WEBAPP_NAME            = your App Service name (e.g. caretrack-api)
#   3. Run database migrations separately (this workflow does NOT migrate).
#
# Triggered manually to avoid surprise production deploys. Switch to the
# `push` trigger below once you trust the pipeline.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths: ["caretrack-backend/**", ".github/workflows/deploy-backend.yml"]

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy API
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: caretrack-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: caretrack-backend/package-lock.json

      # Install production dependencies only (no dev/test tooling in the artifact).
      - run: npm ci --omit=dev

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: caretrack-backend
