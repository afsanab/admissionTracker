name: Deploy Frontend (Azure Static Web Apps)

# Builds the admissions-app SPA and deploys it to Azure Static Web Apps.
#
# SETUP (one-time, done by you in GitHub + Azure):
#   1. Create the Static Web App in Azure and copy its deployment token
#      (Static Web App -> Manage deployment token).
#   2. In GitHub: repo Settings -> Secrets and variables -> Actions, add:
#        - secret   AZURE_STATIC_WEB_APPS_API_TOKEN = the deployment token
#        - variable VITE_API_BASE                   = https://<your-api>.azurewebsites.net
#                                                     (the API origin, NO trailing slash)
#
# Triggered manually by default. Enable the `push` trigger once you trust it.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths: ["admissions-app/**", ".github/workflows/deploy-frontend.yml"]

permissions:
  contents: read

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build & deploy SPA
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admissions-app/package-lock.json

      - name: Install & build
        working-directory: admissions-app
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # Skip the built-in Oryx build; we already built with the correct VITE_API_BASE.
          skip_app_build: true
          app_location: admissions-app
          output_location: dist
